<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Anchor Falls</title>
  <script>
    // GitHub Pages SPA redirect — routes deep links back to the React app.
    // Keeps the first path segment (/sed) so React Router sees the correct path.
    // Based on https://github.com/rafgraph/spa-github-pages
    var l = window.location;
    var pathSegmentsToKeep = 1; // keeps "/sed" prefix
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
